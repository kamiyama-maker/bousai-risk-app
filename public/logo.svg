<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="BCP 実践的 事業継続力強化計画">
  <!-- 背景：オレンジの角丸正方形 -->
  <rect x="0" y="0" width="500" height="500" rx="48" ry="48" fill="#e88545"/>

  <!-- 左上：筆記体 "BCP" 白、斜め、半透明 -->
  <g transform="translate(30,130) rotate(-8)" opacity="0.9">
    <text x="0" y="0" font-family="'Brush Script MT','Segoe Script','cursive'" font-style="italic" font-weight="700" font-size="130" fill="#ffffff">BCP</text>
  </g>

  <!-- 「実」「践」「的」白い角丸正方形 × 3 -->
  <g>
    <rect x="115" y="150" width="80" height="80" rx="8" fill="#ffffff"/>
    <text x="155" y="210" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-weight="900" font-size="54" fill="#e88545">実</text>

    <rect x="210" y="150" width="80" height="80" rx="8" fill="#ffffff"/>
    <text x="250" y="210" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-weight="900" font-size="54" fill="#e88545">践</text>

    <rect x="305" y="150" width="80" height="80" rx="8" fill="#ffffff"/>
    <text x="345" y="210" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-weight="900" font-size="54" fill="#e88545">的</text>
  </g>

  <!-- 「事業継続力」白文字 -->
  <text x="250" y="330" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-weight="900" font-size="68" fill="#ffffff" letter-spacing="2">事業継続力</text>

  <!-- 「強化計画」白文字 -->
  <text x="250" y="425" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-weight="900" font-size="68" fill="#ffffff" letter-spacing="4">強化計画</text>
</svg>
